name: chatify
description: "Chatify production-grade messaging app foundation."
publish_to: 'none'
version: 1.0.3+4

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  go_router: ^16.3.0
  flutter_bloc: ^9.1.1
  bloc_concurrency: ^0.3.0
  equatable: ^2.0.7
  get_it: ^8.2.0
  injectable: ^2.5.2
  dio: ^5.9.0
  drift: ^2.29.0
  sqlite3_flutter_libs: ^0.5.40
  path_provider: ^2.1.5
  path: ^1.9.1
  uuid: ^4.5.1
  collection: ^1.19.1
  flutter_secure_storage: ^9.2.4
  flutter_contacts: ^1.1.9+2
  permission_handler: ^12.0.1
  mobile_scanner: ^7.1.3
  qr_flutter: ^4.1.0
  rxdart: ^0.28.0
  firebase_core: ^4.2.0
  firebase_auth: ^6.1.1
  cloud_firestore: ^6.0.2
  cloud_functions: ^6.0.2
  firebase_storage: ^13.0.2
  firebase_messaging: ^16.0.2
  flutter_local_notifications: ^19.4.2
  flutter_webrtc: ^1.2.0
  file_picker: ^10.3.3
  record: ^6.1.2
  just_audio: ^0.10.5
  url_launcher: ^6.3.2
  json_annotation: ^4.9.0
  firebase_crashlytics: ^5.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.10.1
  injectable_generator: ^2.8.1
  drift_dev: ^2.29.0
  json_serializable: ^6.11.1
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  default-flavor: prod
  generate: true
  uses-material-design: true
  assets:
    - assets/translations/
